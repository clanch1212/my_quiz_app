<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精神壓力測試</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  * { font-family: 'Noto Sans TC', sans-serif; }
  body { background: #f0f4f8; min-height: 100vh; }

  .option-btn {
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .option-btn:active { transform: scale(0.97); }
  .option-btn.selected {
    background: #6366f1 !important;
    border-color: #6366f1 !important;
    color: white !important;
  }
  .option-btn.selected .option-label {
    background: white !important;
    color: #6366f1 !important;
  }

  .progress-bar { transition: width 0.4s ease; }

  .slide-in {
    animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pulse-dot {
    animation: pulseDot 1.2s ease-in-out infinite;
  }
  .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulseDot {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1.2); opacity: 1; }
  }

  .result-card {
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body class="flex items-center justify-center p-4 py-10">

<div class="w-full max-w-lg">

  <!-- 封面 -->
  <div id="cover" class="bg-white rounded-3xl shadow-xl p-8 text-center fade-in">
    <div class="text-6xl mb-4">🧠</div>
    <h1 class="text-3xl font-black text-gray-800 mb-2">精神壓力測試</h1>
    <p class="text-gray-500 text-lg mb-8 leading-relaxed">透過 8 道題目，了解你目前的心理壓力狀態，找到最適合你的調適方向。</p>
    <div class="grid grid-cols-3 gap-3 mb-8 text-sm">
      <div class="bg-indigo-50 rounded-2xl p-3">
        <div class="text-2xl mb-1">📋</div>
        <div class="text-indigo-700 font-medium">8道題目</div>
      </div>
      <div class="bg-purple-50 rounded-2xl p-3">
        <div class="text-2xl mb-1">⚡</div>
        <div class="text-purple-700 font-medium">快速測驗</div>
      </div>
      <div class="bg-pink-50 rounded-2xl p-3">
        <div class="text-2xl mb-1">🎯</div>
        <div class="text-pink-700 font-medium">4種結果</div>
      </div>
    </div>
    <button onclick="startQuiz()" class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-bold text-xl py-4 rounded-2xl transition-all duration-200 shadow-lg shadow-indigo-200">
      開始測驗 →
    </button>
  </div>

  <!-- 測驗畫面 -->
  <div id="quiz" class="hidden">
    <!-- 進度列 -->
    <div class="flex items-center gap-3 mb-6 px-1">
      <span id="progress-text" class="text-sm font-medium text-gray-500 whitespace-nowrap">第 1 / 8 題</span>
      <div class="flex-1 bg-gray-200 rounded-full h-2.5">
        <div id="progress-bar" class="progress-bar bg-indigo-500 h-2.5 rounded-full" style="width:12.5%"></div>
      </div>
    </div>

    <!-- 題目卡片 -->
    <div id="question-card" class="bg-white rounded-3xl shadow-xl p-7">
      <p id="question-text" class="text-xl font-bold text-gray-800 leading-relaxed mb-7"></p>
      <div id="options" class="flex flex-col gap-3"></div>
    </div>
  </div>

  <!-- 計算中動畫 -->
  <div id="calculating" class="hidden text-center py-16 fade-in">
    <div class="text-7xl mb-6">🔮</div>
    <p class="text-2xl font-bold text-gray-700 mb-6">分析中...</p>
    <div class="flex justify-center gap-3">
      <div class="pulse-dot w-4 h-4 bg-indigo-500 rounded-full"></div>
      <div class="pulse-dot w-4 h-4 bg-indigo-500 rounded-full"></div>
      <div class="pulse-dot w-4 h-4 bg-indigo-500 rounded-full"></div>
    </div>
    <p class="text-gray-400 mt-5 text-sm">正在解讀你的心理狀態</p>
  </div>

  <!-- 結果卡片 -->
  <div id="result" class="hidden">
    <div id="result-card" class="result-card rounded-3xl shadow-2xl p-8 text-center text-white mb-4">
      <div id="result-emoji" class="text-7xl mb-4"></div>
      <div id="result-badge" class="inline-block text-sm font-medium px-4 py-1.5 rounded-full mb-4 bg-white/20">壓力程度</div>
      <h2 id="result-title" class="text-3xl font-black mb-4"></h2>
      <p id="result-desc" class="text-lg leading-relaxed opacity-90 mb-6"></p>
      <div id="result-tips" class="bg-white/15 rounded-2xl p-5 text-left space-y-2.5 mb-6"></div>
      <button onclick="restartQuiz()" class="w-full bg-white/20 hover:bg-white/30 active:scale-95 font-bold text-lg py-4 rounded-2xl transition-all duration-200 border border-white/30">
        再測一次 ↺
      </button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    text: "最近一週，你的睡眠狀況如何？",
    options: [
      { label: "A", text: "睡得很好，起來精神飽滿" },
      { label: "B", text: "偶爾淺眠或難入睡" },
      { label: "C", text: "幾乎每天都難入睡或睡不飽" }
    ]
  },
  {
    text: "面對工作或學業上的待辦事項，你的感受是？",
    options: [
      { label: "A", text: "從容應對，有條理地完成" },
      { label: "B", text: "有點焦慮，但還能掌控" },
      { label: "C", text: "感到不知所措，常常拖延逃避" }
    ]
  },
  {
    text: "你上一次真心大笑或感到輕鬆，是什麼時候？",
    options: [
      { label: "A", text: "最近幾天就有" },
      { label: "B", text: "差不多一週前" },
      { label: "C", text: "記不太清楚了，好久沒有這種感覺" }
    ]
  },
  {
    text: "你的身體近期有哪些狀況？",
    options: [
      { label: "A", text: "身體狀態不錯，沒有異狀" },
      { label: "B", text: "偶爾頭痛、肩頸緊繃或腸胃不適" },
      { label: "C", text: "經常性的疲勞、頭痛或身體不舒服" }
    ]
  },
  {
    text: "當有人請你幫忙時，你通常的反應？",
    options: [
      { label: "A", text: "評估一下，能幫就幫，不行就婉拒" },
      { label: "B", text: "即使很忙也不太會拒絕" },
      { label: "C", text: "不管多累都會說好，事後又很懊悔" }
    ]
  },
  {
    text: "你在與家人或朋友相處時，會感到？",
    options: [
      { label: "A", text: "開心，是我充電的重要來源" },
      { label: "B", text: "有時享受，有時卻想一個人待著" },
      { label: "C", text: "提不起勁，甚至覺得是負擔" }
    ]
  },
  {
    text: "你有多久沒有做讓自己感到快樂的事？",
    options: [
      { label: "A", text: "幾乎每天都有屬於自己的時間" },
      { label: "B", text: "偶爾有，大概一週一次" },
      { label: "C", text: "根本想不起來上次是什麼時候" }
    ]
  },
  {
    text: "想到明天或未來，你的直覺感受是？",
    options: [
      { label: "A", text: "期待，覺得有些事值得努力" },
      { label: "B", text: "有點不確定，但還行" },
      { label: "C", text: "不安、害怕，甚至不想去想" }
    ]
  }
];

const results = {
  A: {
    emoji: "🌟",
    badge: "壓力指數：低",
    title: "心理彈性良好",
    desc: "你目前的心理狀態相當穩健！你懂得自我調節，也擁有讓自己充電的生活節奏。保持這份平衡，是你最大的優勢。",
    tips: [
      "✅ 繼續維持良好的睡眠與作息",
      "✅ 定期做你喜歡的事，保持活力",
      "✅ 分享你的正能量，幫助身邊的人"
    ],
    gradient: "from-emerald-400 to-teal-600"
  },
  B: {
    emoji: "⚖️",
    badge: "壓力指數：中",
    title: "隱性壓力累積中",
    desc: "你處於壓力的「灰色地帶」——表面上撐得住，但內心的緊繃感正在悄悄積累。如果不適時調整，可能會逐漸影響你的情緒與健康。",
    tips: [
      "🌿 每天撥出 15 分鐘給自己放空",
      "🌿 試著對不重要的事說「不」",
      "🌿 和你信任的人聊聊最近的狀況"
    ],
    gradient: "from-amber-400 to-orange-500"
  },
  C: {
    emoji: "🌊",
    badge: "壓力指數：高",
    title: "壓力已在拉警報",
    desc: "你正在承受相當沉重的心理壓力，身心都發出了求救信號。這不是你的錯，也不是弱點——但你需要認真的照顧自己了。",
    tips: [
      "🆘 今天就做一件只為自己的事",
      "🆘 考慮和心理師或信任的人談談",
      "🆘 暫時放下完美主義，先好好休息"
    ],
    gradient: "from-rose-500 to-pink-700"
  },
  MIXED: {
    emoji: "🎭",
    badge: "壓力指數：不穩定",
    title: "情緒狀態起伏不定",
    desc: "你的壓力反應相當複雜——某些面向你處理得不錯，但在其他方面卻感到吃力。這種不一致感本身也是壓力的來源之一。",
    tips: [
      "🔍 找出你壓力最大的具體來源",
      "🔍 把生活分割成小目標，一次解決一個",
      "🔍 給自己多一點耐心與理解"
    ],
    gradient: "from-violet-500 to-indigo-600"
  }
};

let answers = [];
let currentQ = 0;

function startQuiz() {
  document.getElementById('cover').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  showQuestion(0);
}

function showQuestion(index) {
  currentQ = index;
  const q = questions[index];
  const total = questions.length;
  const pct = Math.round(((index + 1) / total) * 100);

  document.getElementById('progress-text').textContent = `第 ${index + 1} / ${total} 題`;
  document.getElementById('progress-bar').style.width = pct + '%';

  const card = document.getElementById('question-card');
  card.classList.remove('slide-in');
  void card.offsetWidth;
  card.classList.add('slide-in');

  document.getElementById('question-text').textContent = q.text;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn w-full flex items-center gap-4 p-4 rounded-2xl border-2 border-gray-100 bg-gray-50 hover:border-indigo-300 hover:bg-indigo-50 text-left';
    btn.innerHTML = `
      <span class="option-label flex-shrink-0 w-9 h-9 rounded-xl bg-indigo-100 text-indigo-600 font-bold text-base flex items-center justify-center">${opt.label}</span>
      <span class="text-gray-700 font-medium text-base leading-snug">${opt.text}</span>
    `;
    btn.addEventListener('click', () => selectAnswer(opt.label, btn));
    optDiv.appendChild(btn);
  });
}

function selectAnswer(label, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[currentQ] = label;

  setTimeout(() => {
    if (currentQ < questions.length - 1) {
      showQuestion(currentQ + 1);
    } else {
      showCalculating();
    }
  }, 420);
}

function showCalculating() {
  document.getElementById('quiz').classList.add('hidden');
  const calc = document.getElementById('calculating');
  calc.classList.remove('hidden');
  calc.classList.remove('fade-in');
  void calc.offsetWidth;
  calc.classList.add('fade-in');

  setTimeout(() => {
    showResult();
  }, 3000);
}

function showResult() {
  document.getElementById('calculating').classList.add('hidden');

  const count = { A: 0, B: 0, C: 0 };
  answers.forEach(a => count[a]++);

  let winner = 'A';
  if (count.B > count[winner]) winner = 'B';
  if (count.C > count[winner]) winner = 'C';

  const isTied = (count.A === count.B && count.B === count.C) ||
    (count.A === count.B && count.A >= count.C) ||
    (count.A === count.C && count.A > count.B) ||
    (count.B === count.C && count.B > count.A);

  const key = isTied ? 'MIXED' : winner;
  const r = results[key];

  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-badge').textContent = r.badge;
  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-desc').textContent = r.desc;

  const tipsEl = document.getElementById('result-tips');
  tipsEl.innerHTML = r.tips.map(t =>
    `<p class="text-base font-medium">${t}</p>`
  ).join('');

  const card = document.getElementById('result-card');
  card.className = `result-card rounded-3xl shadow-2xl p-8 text-center text-white mb-4 bg-gradient-to-br ${r.gradient}`;

  const resultDiv = document.getElementById('result');
  resultDiv.classList.remove('hidden');
}

function restartQuiz() {
  answers = [];
  currentQ = 0;
  document.getElementById('result').classList.add('hidden');
  document.getElementById('cover').classList.remove('hidden');
  document.getElementById('cover').classList.remove('fade-in');
  void document.getElementById('cover').offsetWidth;
  document.getElementById('cover').classList.add('fade-in');
}
</script>
</body>
</html>
